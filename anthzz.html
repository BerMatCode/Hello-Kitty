<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>📊 Yorchi Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Patrick Hand', cursive;
      background: #f5f3ff;
      min-height: 100vh;
      color: #1e1b4b;
      padding: 10px;
    }

    .header {
      background: linear-gradient(135deg, #fff, #fce7f3);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 15px;
      border: 2px solid #f9a8d4;
      text-align: center;
      box-shadow: 0 4px 15px rgba(249,168,212,0.2);
    }
    .header h1 {
      font-size: 1.5rem;
      color: #e11d48;
      margin-bottom: 4px;
    }
    .header h1 i {
      color: #f43f5e;
      font-size: 1.3rem;
    }
    .header p {
      font-size: 0.95rem;
      color: #9ca3af;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }
    .stat {
      background: white;
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
      border: 1.5px solid #e9d5ff;
      box-shadow: 0 2px 8px rgba(167,139,250,0.1);
      transition: transform 0.2s;
    }
    .stat:active {
      transform: scale(0.97);
    }
    .stat .icon {
      font-size: 1.2rem;
      margin-bottom: 2px;
    }
    .stat .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #7c3aed;
    }
    .stat .label {
      font-size: 0.8rem;
      color: #a78bfa;
      margin-top: -2px;
    }

    .filters {
      background: white;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
      border: 1.5px solid #e9d5ff;
    }
    .filters select, .filters input {
      font-family: 'Patrick Hand', cursive;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: 1.5px solid #ddd6fe;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #faf5ff;
      color: #4c1d95;
      transition: border-color 0.2s;
    }
    .filters select:focus, .filters input:focus {
      outline: none;
      border-color: #c084fc;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      font-family: 'Patrick Hand', cursive;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn-pink {
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color: white;
    }
    .btn-purple {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      color: white;
    }

    .visit-card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1.5px solid #e9d5ff;
      box-shadow: 0 2px 10px rgba(167,139,250,0.08);
      transition: transform 0.15s;
    }
    .visit-card:active {
      transform: scale(0.98);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #e9d5ff;
    }
    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .icon-android { background: #dcfce7; }
    .icon-ios { background: #dbeafe; }
    .icon-windows { background: #e0e7ff; }
    .icon-mac { background: #f3e8ff; }
    .icon-linux { background: #fef3c7; }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1e1b4b;
      line-height: 1.2;
    }
    .card-time {
      font-size: 0.8rem;
      color: #a78bfa;
      margin-top: 2px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .info-item {
      background: #faf5ff;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .info-label {
      font-size: 0.7rem;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 2px;
    }
    .info-value {
      font-size: 0.9rem;
      color: #4c1d95;
      font-weight: 500;
      word-break: break-all;
    }

    .ua-box {
      background: #f5f3ff;
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 8px;
      border: 1px solid #ede9fe;
    }
    .ua-box .info-label {
      margin-bottom: 4px;
    }
    .ua-text {
      font-size: 0.75rem;
      color: #6b21a8;
      word-break: break-all;
      line-height: 1.4;
      font-family: 'Patrick Hand', cursive;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-os { background: #dbeafe; color: #1d4ed8; }
    .badge-browser { background: #fef3c7; color: #b45309; }
    .badge-mobile { background: #dcfce7; color: #166534; }
    .badge-webview { background: #fce7f3; color: #9d174d; }
    .badge-wv { background: #fef3c7; color: #a16207; }

    .loading, .empty {
      text-align: center;
      padding: 30px 20px;
      color: #a78bfa;
    }
    .loading i {
      font-size: 1.8rem;
      animation: spin 1s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #22c55e;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'Patrick Hand', cursive;
      font-size: 0.95rem;
      box-shadow: 0 4px 15px rgba(34,197,94,0.3);
      transition: transform 0.3s ease;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      color: #c4b5fd;
    }

    @media (min-width: 640px) {
      body { padding: 20px; }
      .stats-row { grid-template-columns: repeat(4, 1fr); }
      .info-grid { grid-template-columns: repeat(3, 1fr); }
      .filters { display: flex; flex-wrap: wrap; gap: 10px; }
      .filters select, .filters input { width: auto; margin-bottom: 0; min-width: 160px; }
      .btn-row { flex: none; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><i class="fas fa-satellite-dish"></i> 📊 Visitas en Vivo</h1>
    <p>Monitor de detalles de dispositivo</p>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="icon">👥</div>
      <div class="num" id="totalVisits">0</div>
      <div class="label">Total</div>
    </div>
    <div class="stat">
      <div class="icon">📱</div>
      <div class="num" id="mobileCount">0</div>
      <div class="label">Móviles</div>
    </div>
    <div class="stat">
      <div class="icon">💻</div>
      <div class="num" id="desktopCount">0</div>
      <div class="label">PC/Mac</div>
    </div>
    <div class="stat">
      <div class="icon">🕐</div>
      <div class="num" id="lastUpdate">--</div>
      <div class="label">Última</div>
    </div>
  </div>

  <div class="filters">
    <select id="filterBrand">
      <option value="all">📱 Todas las marcas</option>
      <option value="Tecno">Tecno</option>
      <option value="Samsung">Samsung</option>
      <option value="Xiaomi">Xiaomi</option>
      <option value="Apple">Apple</option>
      <option value="Huawei">Huawei</option>
      <option value="OPPO">OPPO</option>
      <option value="Vivo">Vivo</option>
      <option value="Motorola">Motorola</option>
    </select>
    <select id="filterOS">
      <option value="all">💿 Todos los sistemas</option>
      <option value="Android">Android</option>
      <option value="iOS">iOS</option>
      <option value="Windows">Windows</option>
      <option value="macOS">macOS</option>
    </select>
    <input type="text" id="searchInput" placeholder="🔎 Buscar..." />
    <div class="btn-row">
      <button class="btn btn-pink" onclick="clearFilters()"><i class="fas fa-broom"></i> Limpiar</button>
      <button class="btn btn-purple" onclick="exportData()"><i class="fas fa-download"></i> Exportar</button>
    </div>
  </div>

  <div id="visitsList">
    <div class="loading">
      <i class="fas fa-spinner"></i>
      <div>Cargando visitas...</div>
    </div>
  </div>

  <div class="footer">
    𖤍 BerMat-Code 𖤍 | Analytics v2.0
  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMsg"></span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjXG9ngsNtezJPqEUcrAKryamI8de8qOo",
      authDomain: "brilli-1011.firebaseapp.com",
      projectId: "brilli-1011",
      storageBucket: "brilli-1011.firebasestorage.app",
      messagingSenderId: "946270544301",
      appId: "1:946270544301:web:d97f630ab58366ef824124",
      measurementId: "G-HV35EW82PF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allVisits = [];

    function parseUA(ua) {
      if (!ua) return null;
      const info = {};
      
      // Detectar OS
      const androidMatch = ua.match(/Android\s([0-9.]+)/i);
      if (androidMatch) {
        info.os = 'Android';
        info.osVersion = androidMatch[1];
      } else if (/iPhone|iPad|iPod/i.test(ua)) {
        info.os = 'iOS';
        const iosMatch = ua.match(/OS\s([0-9_]+)/i);
        if (iosMatch) info.osVersion = iosMatch[1].replace(/_/g, '.');
      } else if (/Windows/i.test(ua)) {
        info.os = 'Windows';
        info.osVersion = 'NT ' + (ua.match(/Windows\sNT\s([0-9.]+)/i)?.[1] || '');
      } else if (/Mac OS X/i.test(ua)) {
        info.os = 'macOS';
        const macMatch = ua.match(/Mac\sOS\sX\s([0-9_]+)/i);
        if (macMatch) info.osVersion = macMatch[1].replace(/_/g, '.');
      } else if (/Linux/i.test(ua)) {
        info.os = 'Linux';
      }

      // Detectar marca/modelo
      const brands = [
        {re: /TECNO\s([A-Z0-9]+)/i, name: 'Tecno'}, {re: /Infinix\s([A-Z0-9]+)/i, name: 'Infinix'},
        {re: /SM-([A-Za-z0-9]+)/i, name: 'Samsung'}, {re: /Redmi\s([A-Za-z0-9]+)/i, name: 'Redmi'},
        {re: /Xiaomi/i, name: 'Xiaomi'}, {re: /iPhone/i, name: 'iPhone'},
        {re: /iPad/i, name: 'iPad'}, {re: /HUAWEI\s([A-Za-z0-9-]+)/i, name: 'Huawei'},
        {re: /OPPO\s([A-Za-z0-9-]+)/i, name: 'OPPO'}, {re: /vivo\s([A-Za-z0-9-]+)/i, name: 'Vivo'},
        {re: /Realme\s([A-Za-z0-9]+)/i, name: 'Realme'}, {re: /Moto\s([A-Za-z0-9]+)/i, name: 'Motorola'}
      ];
      for (const b of brands) {
        const m = ua.match(b.re);
        if (m) { info.brand = b.name; info.model = m[1] || ''; break; }
      }
      if (!info.brand) {
        const modelMatch = ua.match(/;\s([A-Z0-9\-_]+)\sBuild/i);
        if (modelMatch) { info.model = modelMatch[1]; info.brand = 'Desconocido'; }
      }

      // Build number
      const buildMatch = ua.match(/Build\/([A-Za-z0-9.]+)/);
      if (buildMatch) info.build = buildMatch[1];

      // Navegador
      if (/Chrome/i.test(ua) && /Edg/i.test(ua)) {
        info.browser = 'Edge'; info.browserVersion = ua.match(/Edg\/([0-9.]+)/)?.[1];
      } else if (/Chrome/i.test(ua) && !/Edg|OPR/i.test(ua)) {
        info.browser = 'Chrome'; info.browserVersion = ua.match(/Chrome\/([0-9.]+)/)?.[1];
      } else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) {
        info.browser = 'Safari'; info.browserVersion = ua.match(/Version\/([0-9.]+)/)?.[1];
      } else if (/Firefox/i.test(ua)) {
        info.browser = 'Firefox'; info.browserVersion = ua.match(/Firefox\/([0-9.]+)/)?.[1];
      } else if (/OPR|Opera/i.test(ua)) {
        info.browser = 'Opera'; info.browserVersion = ua.match(/(?:OPR|Opera)\/([0-9.]+)/)?.[1];
      }

      // Motor
      const webkitMatch = ua.match(/AppleWebKit\/([0-9.]+)/);
      if (webkitMatch) info.webkit = webkitMatch[1];

      // Indicadores
      info.isMobile = /Mobile|Android|iPhone|iPad|iPod/i.test(ua);
      info.isWebView = /\bwv\b/i.test(ua) || /WebView/i.test(ua);
      info.isTablet = /Tablet/i.test(ua);

      return info;
    }

    function getDeviceIcon(os) {
      switch(os) {
        case 'Android': return '🤖';
        case 'iOS': return '🍎';
        case 'Windows': return '🪟';
        case 'macOS': return '💻';
        case 'Linux': return '🐧';
        default: return '📲';
      }
    }

    function getIconClass(os) {
      switch(os) {
        case 'Android': return 'icon-android';
        case 'iOS': return 'icon-ios';
        case 'Windows': return 'icon-windows';
        case 'macOS': return 'icon-mac';
        case 'Linux': return 'icon-linux';
        default: return 'icon-android';
      }
    }

    function formatTime(ts) {
      if (!ts) return {time: '--:--', date: ''};
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return {
        time: d.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        date: d.toLocaleDateString('es-PE', {day:'2-digit',month:'short',year:'numeric'})
      };
    }

    function renderCards(visits) {
      const list = document.getElementById('visitsList');
      if (visits.length === 0) {
        list.innerHTML = '<div class="empty">✨ No se encontraron visitas</div>';
        return;
      }

      list.innerHTML = visits.map(v => {
        const ua = parseUA(v.userAgent);
        const t = formatTime(v.timestamp);
        const icon = getDeviceIcon(ua?.os || v.os);
        const iconClass = getIconClass(ua?.os || v.os);
        const deviceName = v.device || `${v.brand} ${v.model || ''}`.trim() || 'Dispositivo';
        
        let badges = '';
        if (ua?.os) badges += `<span class="badge badge-os">${icon} ${ua.os}${ua.osVersion ? ' ' + ua.osVersion : ''}</span>`;
        if (ua?.browser) badges += `<span class="badge badge-browser">🌐 ${ua.browser} ${ua.browserVersion || ''}</span>`;
        if (ua?.isMobile) badges += `<span class="badge badge-mobile">📱 ${ua.isTablet ? 'Tablet' : 'Móvil'}</span>`;
        if (ua?.isWebView) badges += `<span class="badge badge-webview">📦 WebView</span>`;

        let infos = '';
        if (ua?.brand) infos += `
          <div class="info-item">
            <span class="info-label">Marca</span>
            <span class="info-value">${ua.brand}</span>
          </div>`;
        if (ua?.model) infos += `
          <div class="info-item">
            <span class="info-label">Modelo</span>
            <span class="info-value">${ua.model}</span>
          </div>`;
        if (ua?.build) infos += `
          <div class="info-item">
            <span class="info-label">Build</span>
            <span class="info-value">${ua.build}</span>
          </div>`;
        infos += `
          <div class="info-item">
            <span class="info-label">Pantalla</span>
            <span class="info-value">${v.screen || '—'}</span>
          </div>`;
        if (ua?.webkit) infos += `
          <div class="info-item">
            <span class="info-label">Motor Web</span>
            <span class="info-value">WebKit ${ua.webkit}</span>
          </div>`;
        infos += `
          <div class="info-item">
            <span class="info-label">Idioma</span>
            <span class="info-value">${v.language || '—'}</span>
          </div>`;
        if (v.memory && v.memory !== 'N/A') infos += `
          <div class="info-item">
            <span class="info-label">RAM</span>
            <span class="info-value">${v.memory}</span>
          </div>`;
        if (v.cores && v.cores !== 'N/A') infos += `
          <div class="info-item">
            <span class="info-label">Núcleos CPU</span>
            <span class="info-value">${v.cores}</span>
          </div>`;

        return `
          <div class="visit-card">
            <div class="card-header">
              <div class="card-icon ${iconClass}">${icon}</div>
              <div style="flex:1;min-width:0;">
                <div class="card-title">${deviceName}</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">${badges}</div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <div>
                <span style="font-size:1.1rem;color:#7c3aed;font-weight:600;">${t.time}</span>
              </div>
              <span style="font-size:0.8rem;color:#a78bfa;">${t.date}</span>
            </div>
            <div class="info-grid">${infos}</div>
            ${v.userAgent ? `
              <div class="ua-box">
                <span class="info-label">📋 User Agent Completo</span>
                <div class="ua-text">${v.userAgent}</div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function updateStats(visits) {
      document.getElementById('totalVisits').textContent = visits.length;
      const mobile = visits.filter(v => ['Android','iOS'].includes(v.os)).length;
      const desktop = visits.filter(v => ['Windows','macOS','Linux'].includes(v.os)).length;
      document.getElementById('mobileCount').textContent = mobile;
      document.getElementById('desktopCount').textContent = desktop;
      if (visits[0]?.timestamp) {
        const d = visits[0].timestamp.toDate();
        document.getElementById('lastUpdate').textContent = d.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'});
      }
    }

    function filterVisits() {
      const brand = document.getElementById('filterBrand').value;
      const os = document.getElementById('filterOS').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allVisits;
      if (brand !== 'all') filtered = filtered.filter(v => v.brand === brand);
      if (os !== 'all') filtered = filtered.filter(v => v.os === os);
      if (search) filtered = filtered.filter(v =>
        (v.device + v.brand + v.model + v.os + v.browser + v.language + v.screen + v.userAgent || '')
          .toLowerCase().includes(search));
      renderCards(filtered);
    }

    function clearFilters() {
      document.getElementById('filterBrand').value = 'all';
      document.getElementById('filterOS').value = 'all';
      document.getElementById('searchInput').value = '';
      filterVisits();
      showToast('Filtros limpiados ✨');
    }

    function exportData() {
      if (!allVisits.length) { showToast('No hay datos para exportar'); return; }
      const h = ['Fecha','Hora','Dispositivo','Marca','Modelo','OS','Version','Build','Navegador','VersionNav','Motor','Pantalla','RAM','Cores','Zona','Idioma','Conexion','WebView','UserAgent'];
      const rows = allVisits.map(v => {
        const ua = parseUA(v.userAgent);
        const t = formatTime(v.timestamp);
        return [t.date, t.time, v.device, v.brand, v.model, v.os, v.osVersion, ua?.build||'', v.browser, v.browserVersion, ua?.webkit||'', v.screen, v.memory, v.cores, v.timezone, v.language, v.connection, ua?.isWebView?'Si':'No', (v.userAgent||'').replace(/"/g, '')];
      });
      const csv = [h.join(','), ...rows.map(r => r.map(f => `"${String(f||'').replace(/"/g,'""')}"`).join(','))].join('\n');
      const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `visitas-yorchi-${new Date().toISOString().slice(0,10)}.csv`;
      a.click(); URL.revokeObjectURL(url);
      showToast('✅ Exportado correctamente');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.clearFilters = clearFilters;
    window.exportData = exportData;
    document.getElementById('filterBrand').addEventListener('change', filterVisits);
    document.getElementById('filterOS').addEventListener('change', filterVisits);
    document.getElementById('searchInput').addEventListener('input', filterVisits);

    const q = query(collection(db, 'visitas'), orderBy('timestamp', 'desc'), limit(150));
    onSnapshot(q, (snapshot) => {
      allVisits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      updateStats(allVisits);
      filterVisits();
    }, (err) => {
      document.getElementById('visitsList').innerHTML = `<div class="empty" style="color:#ef4444">❌ Error: ${err.message}</div>`;
    });
  </script>
</body>
