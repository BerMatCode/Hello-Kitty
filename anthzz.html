<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Analytics - Yorchi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #ff1493; --primary-light: #ff69b4; --secondary: #9333ea;
      --bg-dark: #0f0f1a; --bg-card: #1a1a2e; --text: #f8fafc; --text-muted: #94a3b8;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(ellipse at top, #1a1a3a 0%, var(--bg-dark) 70%);
      color: var(--text); min-height: 100vh; padding: 16px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
      padding: 16px 20px; background: linear-gradient(135deg, rgba(255,20,147,0.15), rgba(147,51,234,0.1));
      border-radius: 16px; margin-bottom: 16px; border: 1px solid rgba(255,105,180,0.25);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .header h1 { font-size: 1.3rem; font-weight: 600; color: var(--primary-light); display: flex; align-items: center; gap: 8px; }
    .header h1 i { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
    
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; width: 100%; max-width: 500px; }
    .stat-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      padding: 12px 14px; border-radius: 12px; text-align: center;
      border: 1px solid rgba(255,255,255,0.1); transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--primary-light); }
    .stat-card .num { font-size: 1.5rem; font-weight: 700; color: var(--success); line-height: 1; }
    .stat-card .label { font-size: 0.75rem; opacity: 0.85; margin-top: 4px; }
    
    .filters {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center;
      background: rgba(255,255,255,0.05); padding: 10px 12px; border-radius: 12px;
    }
    .filters select, .filters input {
      padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.1); color: var(--text); font-size: 0.85rem;
      outline: none; transition: border-color 0.2s;
    }
    .filters select:focus, .filters input:focus { border-color: var(--primary-light); }
    .filters button {
      padding: 8px 14px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 0.85rem; font-weight: 500; transition: 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .filters button.primary { background: var(--primary); color: white; }
    .filters button.primary:hover { background: var(--primary-light); }
    .filters button.secondary { background: rgba(255,255,255,0.15); color: var(--text); }
    .filters button.secondary:hover { background: rgba(255,255,255,0.25); }

    .table-container {
      background: var(--bg-card); border-radius: 16px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th {
      background: linear-gradient(135deg, rgba(255,20,147,0.2), rgba(147,51,234,0.15));
      padding: 14px 12px; text-align: left; font-weight: 600; font-size: 0.8rem;
      color: var(--primary-light); position: sticky; top: 0; z-index: 10;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    td {
      padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 0.82rem; vertical-align: top; line-height: 1.4;
    }
    tr:hover { background: rgba(255,255,255,0.04); }
    tr.new-entry { animation: highlight 1.5s ease-out; }
    @keyframes highlight { 0%{background:rgba(74,222,128,0.2);} 100%{background:transparent;} }
    
    .device-cell { display: flex; flex-direction: column; gap: 4px; }
    .device-name { font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .device-meta { font-size: 0.75rem; opacity: 0.85; display: flex; flex-wrap: wrap; gap: 4px; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
      border-radius: 6px; font-size: 0.7rem; font-weight: 500;
    }
    .badge.os { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .badge.browser { background: rgba(251,191,36,0.2); color: #fcd34d; }
    .badge.screen { background: rgba(147,51,234,0.2); color: #c4b5fd; }
    
    .time-cell { min-width: 160px; }
    .time-main { font-weight: 600; color: var(--text); font-size: 0.9rem; }
    .time-sub { font-size: 0.75rem; color: var(--text-muted); }
    
    .loading, .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .loading i { animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .footer {
      text-align: center; padding: 16px; color: var(--text-muted); font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.1); margin-top: 16px;
    }
    
    @media (max-width: 768px) {
      .header { flex-direction: column; align-items: flex-start; }
      .stats { width: 100%; }
      .hide-mobile { display: none; }
      .filters { flex-wrap: wrap; }
      .filters select, .filters input { flex: 1; min-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-satellite"></i> Analytics - Hello Kitty Yorchi</h1>
    <div class="stats">
      <div class="stat-card"><div class="num" id="totalVisits">0</div><div class="label">Visitas</div></div>
      <div class="stat-card"><div class="num" id="mobileCount">0</div><div class="label">📱 Móviles</div></div>
      <div class="stat-card"><div class="num" id="desktopCount">0</div><div class="label">💻 PC</div></div>
      <div class="stat-card"><div class="num" id="lastUpdate">--:--</div><div class="label">Última</div></div>
    </div>
  </div>

  <div class="filters">
    <select id="filterOS">
      <option value="all">🌐 Todos los SO</option>
      <option value="Android">🤖 Android</option>
      <option value="iOS">🍎 iOS</option>
      <option value="Windows">🪟 Windows</option>
      <option value="macOS">💻 macOS</option>
      <option value="Linux">🐧 Linux</option>
    </select>
    <select id="filterBrowser">
      <option value="all">🌍 Todos los navegadores</option>
      <option value="Chrome">Chrome</option>
      <option value="Safari">Safari</option>
      <option value="Firefox">Firefox</option>
      <option value="Edge">Edge</option>
      <option value="Opera">Opera</option>
    </select>
    <select id="filterBrand">
      <option value="all">🏭 Todas las marcas</option>
      <option value="Tecno">Tecno</option>
      <option value="Samsung">Samsung</option>
      <option value="Xiaomi">Xiaomi</option>
      <option value="Apple">Apple</option>
      <option value="Infinix">Infinix</option>
    </select>
    <input type="text" id="searchInput" placeholder="🔍 Buscar dispositivo..." />
    <button class="secondary" onclick="clearFilters()"><i class="fas fa-rotate-right"></i></button>
    <button class="primary" onclick="exportData()"><i class="fas fa-download"></i> CSV</button>
  </div>

  <div class="table-container">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>🕐 Fecha y Hora</th>
            <th>📱 Dispositivo</th>
            <th>🌐 Navegador</th>
            <th class="hide-mobile">📐 Pantalla</th>
            <th class="hide-mobile">🌍 Zona</th>
            <th>🔤 Idioma</th>
            <th class="hide-mobile">📋 User Agent</th>
          </tr>
        </thead>
        <tbody id="visitsBody">
          <tr><td colspan="7" class="loading"><i class="fas fa-spinner"></i> Cargando datos en tiempo real...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    <i class="fas fa-heart" style="color:#ff69b4"></i> Desarrollado con amor para Yorchi • <span id="liveIndicator">🟢 En vivo</span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjXG9ngsNtezJPqEUcrAKryamI8de8qOo",
      authDomain: "brilli-1011.firebaseapp.com",
      projectId: "brilli-1011",
      storageBucket: "brilli-1011.firebasestorage.app",
      messagingSenderId: "946270544301",
      appId: "1:946270544301:web:d97f630ab58366ef824124",
      measurementId: "G-HV35EW82PF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allVisits = [], lastId = null;

    function formatDateTime(ts) {
      if (!ts) return { main: '--:--', sub: '' };
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return {
        main: d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
        sub: d.toLocaleDateString('es-PE', { day: '2-digit', month: 'short', year: 'numeric' })
      };
    }

    function getDeviceIcon(os, manufacturer) {
      if (manufacturer === 'Tecno') return '✨';
      if (os === 'Android') return '🤖';
      if (os === 'iOS') return '🍎';
      if (os === 'Windows') return '🪟';
      if (os === 'macOS') return '💻';
      if (os === 'Linux') return '🐧';
      return '📱';
    }

    function renderTable(visits) {
      const tbody = document.getElementById('visitsBody');
      if (visits.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">✨ Esperando primeras visitas...</td></tr>';
        return;
      }
      tbody.innerHTML = visits.map((v, idx) => {
        const time = formatDateTime(v.timestamp);
        const icon = getDeviceIcon(v.os, v.manufacturer);
        const isNew = v.id === lastId;
        return `
          <tr class="${isNew ? 'new-entry' : ''}">
            <td class="time-cell">
              <div class="time-main">${time.main}</div>
              <div class="time-sub">${time.sub}</div>
            </td>
            <td>
              <div class="device-cell">
                <div class="device-name">${icon} ${v.device}</div>
                <div class="device-meta">
                  <span class="badge os">${v.os}${v.osVersion ? ` ${v.osVersion}` : ''}</span>
                  ${v.manufacturer ? `<span class="badge browser">${v.manufacturer}</span>` : ''}
                  ${v.model && v.model !== v.device ? `<span class="badge screen">${v.model}</span>` : ''}
                </div>
              </div>
            </td>
            <td><span class="badge browser">${v.browser}${v.browserVersion ? ` ${v.browserVersion.split('.')[0]}` : ''}</span></td>
            <td class="hide-mobile"><span class="badge screen">${v.screen}</span></td>
            <td class="hide-mobile">${v.timezone?.split('/')?.pop() || '--'}</td>
            <td>${v.language?.split('-')[0].toUpperCase() || '--'}</td>
            <td class="hide-mobile" title="${v.userAgent || ''}"><code style="font-size:0.7rem;opacity:0.8">${(v.userAgent || '').substring(0, 50)}${(v.userAgent?.length > 50) ? '...' : ''}</code></td>
          </tr>
        `;
      }).join('');
    }

    function updateStats(visits) {
      document.getElementById('totalVisits').textContent = visits.length;
      const mobile = visits.filter(v => ['Android','iOS'].includes(v.os)).length;
      const desktop = visits.filter(v => ['Windows','macOS','Linux'].includes(v.os)).length;
      document.getElementById('mobileCount').textContent = mobile;
      document.getElementById('desktopCount').textContent = desktop;
      if (visits[0]?.timestamp) {
        const d = visits[0].timestamp.toDate();
        document.getElementById('lastUpdate').textContent = d.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'});
      }
    }

    function filterVisits() {
      const os = document.getElementById('filterOS').value;
      const browser = document.getElementById('filterBrowser').value;
      const brand = document.getElementById('filterBrand').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = [...allVisits];
      if (os !== 'all') filtered = filtered.filter(v => v.os === os);
      if (browser !== 'all') filtered = filtered.filter(v => v.browser === browser);
      if (brand !== 'all') filtered = filtered.filter(v => v.manufacturer === brand);
      if (search) {
        filtered = filtered.filter(v => 
          v.device?.toLowerCase().includes(search) ||
          v.manufacturer?.toLowerCase().includes(search) ||
          v.model?.toLowerCase().includes(search) ||
          v.os?.toLowerCase().includes(search) ||
          v.browser?.toLowerCase().includes(search) ||
          v.userAgent?.toLowerCase().includes(search)
        );
      }
      renderTable(filtered);
    }

    function clearFilters() {
      document.getElementById('filterOS').value = 'all';
      document.getElementById('filterBrowser').value = 'all';
      document.getElementById('filterBrand').value = 'all';
      document.getElementById('searchInput').value = '';
      filterVisits();
    }

    function exportData() {
      if (!allVisits.length) return alert('No hay datos para exportar');
      const headers = ['Fecha','Hora Local','Dispositivo','Fabricante','Modelo','SO','Versión SO','Navegador','Versión Nav','Pantalla','Idioma','Zona Horaria','Platform','User Agent'];
      const rows = allVisits.map(v => {
        const d = v.timestamp?.toDate ? v.timestamp.toDate() : new Date(v.timestamp);
        return [
          d.toISOString(), v.localTime, v.device, v.manufacturer, v.model, v.os, v.osVersion,
          v.browser, v.browserVersion, v.screen, v.language, v.timezone, v.platform, `"${(v.userAgent||'').replace(/"/g,'""')}"`
        ].map(x => `"${String(x).replace(/"/g,'""')}"`).join(',');
      });
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url;
      a.download = `visitas-yorchi-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    window.clearFilters = clearFilters;
    window.exportData = exportData;

    const q = query(collection(db, 'visitas'), orderBy('timestamp', 'desc'), limit(150));
    onSnapshot(q, (snapshot) => {
      const newVisits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      if (newVisits.length && newVisits[0].id !== lastId) {
        lastId = newVisits[0].id;
      }
      allVisits = newVisits;
      updateStats(allVisits);
      filterVisits();
    }, (error) => {
      document.getElementById('visitsBody').innerHTML = 
        `<tr><td colspan="7" style="color:var(--danger);text-align:center">❌ Error de conexión: ${error.message}</td></tr>`;
    });

    document.getElementById('filterOS').addEventListener('change', filterVisits);
    document.getElementById('filterBrowser').addEventListener('change', filterVisits);
    document.getElementById('filterBrand').addEventListener('change', filterVisits);
    document.getElementById('searchInput').addEventListener('input', filterVisits);
    
    // Indicador de conexión
    window.addEventListener('online', () => document.getElementById('liveIndicator').innerHTML = '🟢 En vivo');
    window.addEventListener('offline', () => document.getElementById('liveIndicator').innerHTML = '🔴 Sin conexión');
  </script>
</body>
</html>
