<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Analytics - Yorchi</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff; min-height: 100vh; padding: 20px;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 25px; background: rgba(255,20,147,0.15);
      border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,105,180,0.3);
    }
    .header h1 { font-size: 1.5rem; color: #ff69b4; }
    .stats { display: flex; gap: 15px; flex-wrap: wrap; }
    .stat-card {
      background: rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 10px;
      text-align: center; min-width: 120px; border: 1px solid rgba(255,255,255,0.1);
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 700; color: #4ade80; }
    .stat-card .label { font-size: 0.85rem; opacity: 0.8; }
    
    .filters { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .filters select, .filters input {
      padding: 8px 12px; border-radius: 8px; border: none;
      background: rgba(255,255,255,0.15); color: #fff; font-size: 0.9rem;
    }
    .filters button {
      padding: 8px 16px; border-radius: 8px; border: none;
      background: #ff1493; color: #fff; cursor: pointer; font-weight: 500;
      transition: 0.2s;
    }
    .filters button:hover { background: #ff69b4; }

    .table-container {
      background: rgba(255,255,255,0.08); border-radius: 12px;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: rgba(255,20,147,0.25); padding: 14px 12px; text-align: left;
      font-weight: 600; font-size: 0.9rem; color: #ff69b4; position: sticky; top: 0;
    }
    td {
      padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.85rem; vertical-align: top;
    }
    tr:hover { background: rgba(255,255,255,0.05); }
    .device-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; background: rgba(74,222,128,0.2);
      border-radius: 20px; font-size: 0.8rem;
    }
    .os-badge {
      display: inline-flex; padding: 3px 8px; background: rgba(59,130,246,0.2);
      border-radius: 4px; font-size: 0.75rem; margin-left: 5px;
    }
    .browser-badge {
      display: inline-flex; padding: 3px 8px; background: rgba(251,191,36,0.2);
      border-radius: 4px; font-size: 0.75rem; margin-left: 5px;
    }
    .time { color: #94a3b8; font-size: 0.8rem; }
    .time strong { color: #fff; }
    .loading { text-align: center; padding: 40px; color: #94a3b8; }
    .empty { text-align: center; padding: 40px; color: #94a3b8; font-style: italic; }
    
    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 15px; text-align: center; }
      .stats { justify-content: center; }
      table { font-size: 0.8rem; }
      th, td { padding: 8px 6px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-chart-line"></i> 📊 Visitas - Hello Kitty Yorchi</h1>
    <div class="stats">
      <div class="stat-card"><div class="num" id="totalVisits">0</div><div class="label">Total Visitas</div></div>
      <div class="stat-card"><div class="num" id="mobileCount">0</div><div class="label">Móviles</div></div>
      <div class="stat-card"><div class="num" id="desktopCount">0</div><div class="label">PC/Mac</div></div>
      <div class="stat-card"><div class="num" id="lastUpdate">--:--</div><div class="label">Última</div></div>
    </div>
  </div>

  <div class="filters">
    <select id="filterDevice">
      <option value="all">Todos los dispositivos</option>
      <option value="Android">Android</option>
      <option value="iOS">iOS</option>
      <option value="Windows">Windows</option>
      <option value="macOS">macOS</option>
      <option value="Linux">Linux</option>
    </select>
    <select id="filterBrowser">
      <option value="all">Todos los navegadores</option>
      <option value="Chrome">Chrome</option>
      <option value="Safari">Safari</option>
      <option value="Firefox">Firefox</option>
      <option value="Edge">Edge</option>
    </select>
    <input type="text" id="searchInput" placeholder="🔍 Buscar..." />
    <button onclick="clearFilters()"><i class="fas fa-rotate-right"></i> Limpiar</button>
    <button onclick="exportData()"><i class="fas fa-download"></i> Exportar</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>🕐 Hora</th>
          <th>📱 Dispositivo</th>
          <th class="hide-mobile">🌐 Navegador</th>
          <th class="hide-mobile">📐 Pantalla</th>
          <th class="hide-mobile">🌍 Zona</th>
          <th>🔤 Idioma</th>
          <th class="hide-mobile">📋 User Agent</th>
        </tr>
      </thead>
      <tbody id="visitsBody">
        <tr><td colspan="7" class="loading">⏳ Cargando visitas...</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjXG9ngsNtezJPqEUcrAKryamI8de8qOo",
      authDomain: "brilli-1011.firebaseapp.com",
      projectId: "brilli-1011",
      storageBucket: "brilli-1011.firebasestorage.app",
      messagingSenderId: "946270544301",
      appId: "1:946270544301:web:d97f630ab58366ef824124",
      measurementId: "G-HV35EW82PF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allVisits = [];

    function formatTime(ts) {
      if (!ts) return '--:--';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleString('es-PE', { 
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    function renderTable(visits) {
      const tbody = document.getElementById('visitsBody');
      if (visits.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">✨ Aún no hay visitas registradas</td></tr>';
        return;
      }
      tbody.innerHTML = visits.map(v => {
        const deviceIcon = v.os === 'Android' ? '🤖' : v.os === 'iOS' ? '🍎' : v.os === 'Windows' ? '🪟' : v.os === 'macOS' ? '💻' : '🐧';
        return `
          <tr>
            <td><div class="time"><strong>${formatTime(v.timestamp)}</strong><br>${v.localTime || ''}</div></td>
            <td><span class="device-badge">${deviceIcon} ${v.device}</span><span class="os-badge">${v.os}</span></td>
            <td class="hide-mobile"><span class="browser-badge">${v.browser}</span></td>
            <td class="hide-mobile">${v.screen || '--'}</td>
            <td class="hide-mobile">${v.timezone?.split('/')?.pop() || '--'}</td>
            <td>${v.language || '--'}</td>
            <td class="hide-mobile" title="${v.userAgent || ''}">${(v.userAgent || '').substring(0, 40)}${(v.userAgent?.length > 40) ? '...' : ''}</td>
          </tr>
        `;
      }).join('');
    }

    function updateStats(visits) {
      document.getElementById('totalVisits').textContent = visits.length;
      const mobile = visits.filter(v => ['Android','iOS'].includes(v.os)).length;
      const desktop = visits.filter(v => ['Windows','macOS','Linux'].includes(v.os)).length;
      document.getElementById('mobileCount').textContent = mobile;
      document.getElementById('desktopCount').textContent = desktop;
      if (visits[0]?.timestamp) {
        const d = visits[0].timestamp.toDate();
        document.getElementById('lastUpdate').textContent = d.toLocaleTimeString('es-PE');
      }
    }

    function filterVisits() {
      const device = document.getElementById('filterDevice').value;
      const browser = document.getElementById('filterBrowser').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = allVisits;
      if (device !== 'all') filtered = filtered.filter(v => v.os === device);
      if (browser !== 'all') filtered = filtered.filter(v => v.browser === browser);
      if (search) {
        filtered = filtered.filter(v => 
          v.device?.toLowerCase().includes(search) ||
          v.os?.toLowerCase().includes(search) ||
          v.browser?.toLowerCase().includes(search) ||
          v.language?.toLowerCase().includes(search) ||
          v.userAgent?.toLowerCase().includes(search)
        );
      }
      renderTable(filtered);
    }

    function clearFilters() {
      document.getElementById('filterDevice').value = 'all';
      document.getElementById('filterBrowser').value = 'all';
      document.getElementById('searchInput').value = '';
      filterVisits();
    }

    function exportData() {
      const data = allVisits.map(v => ({
        timestamp: formatTime(v.timestamp),
        localTime: v.localTime,
        device: v.device,
        os: v.os,
        browser: v.browser,
        screen: v.screen,
        language: v.language,
        timezone: v.timezone,
        platform: v.platform,
        userAgent: v.userAgent
      }));
      const csv = Object.keys(data[0]||{}).join(',') + '\n' + 
        data.map(row => Object.values(row).map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], {type: 'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `visitas-yorchi-${new Date().toISOString().slice(0,10)}.csv`;
      a.click(); URL.revokeObjectURL(url);
    }

    // Exponer funciones globalmente
    window.clearFilters = clearFilters;
    window.exportData = exportData;

    // Listener en tiempo real
    const q = query(collection(db, 'visitas'), orderBy('timestamp', 'desc'), limit(100));
    onSnapshot(q, (snapshot) => {
      allVisits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      updateStats(allVisits);
      filterVisits();
    }, (error) => {
      document.getElementById('visitsBody').innerHTML = 
        `<tr><td colspan="7" style="color:#f87171">❌ Error: ${error.message}</td></tr>`;
    });

    // Filtros
    document.getElementById('filterDevice').addEventListener('change', filterVisits);
    document.getElementById('filterBrowser').addEventListener('change', filterVisits);
    document.getElementById('searchInput').addEventListener('input', filterVisits);
  </script>
</body>
</html>
