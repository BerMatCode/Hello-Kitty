<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✨ Analytics Dashboard - Yorchi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #ff1493; --primary-light: #ff69b4; --secondary: #7c3aed;
      --bg-dark: #0f0f1a; --bg-card: #1a1a2e; --bg-hover: #252540;
      --text: #f1f5f9; --text-muted: #94a3b8; --success: #22c55e; --warning: #f59e0b;
      --border: rgba(255,255,255,0.1); --shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif; background: var(--bg-dark);
      color: var(--text); min-height: 100vh; line-height: 1.6;
    }
    
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 25px; background: linear-gradient(135deg, var(--bg-card), var(--bg-hover));
      border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .header h1 { 
      font-size: 1.6rem; font-weight: 700; 
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 10px;
    }
    
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-top: 15px;
    }
    .stat-card {
      background: linear-gradient(145deg, var(--bg-card), var(--bg-hover));
      padding: 16px 20px; border-radius: 12px; text-align: center;
      border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,20,147,0.15); }
    .stat-card .num { 
      font-size: 2rem; font-weight: 700; color: var(--success); 
      text-shadow: 0 0 20px rgba(34,197,94,0.3);
    }
    .stat-card .label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .stat-card.pink .num { color: var(--primary-light); text-shadow: 0 0 20px rgba(255,105,180,0.3); }
    .stat-card.purple .num { color: var(--secondary); text-shadow: 0 0 20px rgba(124,58,237,0.3); }
    
    .filters {
      display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
      background: var(--bg-card); padding: 15px; border-radius: 12px;
      border: 1px solid var(--border);
    }
    .filters select, .filters input {
      padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-hover); color: var(--text); font-size: 0.9rem;
      min-width: 150px; transition: border-color 0.2s;
    }
    .filters select:focus, .filters input:focus {
      outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(255,105,180,0.2);
    }
    .filters button {
      padding: 10px 20px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white; cursor: pointer; font-weight: 500; transition: transform 0.2s, box-shadow 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .filters button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,20,147,0.4); }
    .filters button.secondary {
      background: linear-gradient(135deg, var(--secondary), #a78bfa);
    }
    
    .table-wrapper {
      background: var(--bg-card); border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th {
      background: linear-gradient(135deg, rgba(255,20,147,0.15), rgba(124,58,237,0.1));
      padding: 16px 14px; text-align: left; font-weight: 600; font-size: 0.85rem;
      color: var(--primary-light); text-transform: uppercase; letter-spacing: 0.5px;
      position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px);
    }
    td {
      padding: 14px; border-bottom: 1px solid var(--border); font-size: 0.9rem;
      vertical-align: middle; transition: background 0.2s;
    }
    tr:hover { background: var(--bg-hover); }
    
    .badge {
      display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px;
      border-radius: 20px; font-size: 0.8rem; font-weight: 500;
      background: rgba(255,255,255,0.1); border: 1px solid var(--border);
    }
    .badge.device { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #86efac; }
    .badge.os { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: #93c5fd; }
    .badge.browser { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.3); color: #fcd34d; }
    
    .time-cell { min-width: 180px; }
    .time-main { font-weight: 600; color: var(--text); }
    .time-sub { font-size: 0.8rem; color: var(--text-muted); }
    
    .loading, .empty {
      text-align: center; padding: 50px 20px; color: var(--text-muted);
    }
    .loading i { font-size: 2rem; margin-bottom: 15px; color: var(--primary-light); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    
    .device-details { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .device-details span { color: var(--text); font-weight: 500; }
    
    .ua-cell { max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; font-size: 0.8rem; color: var(--text-muted); }
    
    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 20px; text-align: center; }
      .filters { flex-direction: column; }
      .filters select, .filters input, .filters button { width: 100%; }
      .hide-mobile { display: none; }
      table { font-size: 0.85rem; }
      th, td { padding: 10px 8px; }
    }
    
    .toast {
      position: fixed; bottom: 20px; right: 20px; padding: 14px 20px;
      background: var(--success); color: white; border-radius: 10px;
      box-shadow: var(--shadow); z-index: 1000; display: none; animation: slideIn 0.3s ease;
    }
    .toast.show { display: flex; align-items: center; gap: 10px; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-satellite-dish"></i> 📊 Visitas en Tiempo Real</h1>
      <div class="stats-grid">
        <div class="stat-card"><div class="num" id="totalVisits">0</div><div class="label">Total Visitas</div></div>
        <div class="stat-card pink"><div class="num" id="mobileCount">0</div><div class="label">📱 Móviles</div></div>
        <div class="stat-card purple"><div class="num" id="desktopCount">0</div><div class="label">💻 PC/Mac</div></div>
        <div class="stat-card"><div class="num" id="lastUpdate">--:--</div><div class="label">Última</div></div>
      </div>
    </div>

    <div class="filters">
      <select id="filterBrand">
        <option value="all">✨ Todas las marcas</option>
        <option value="Tecno">Tecno</option>
        <option value="Samsung">Samsung</option>
        <option value="Xiaomi">Xiaomi</option>
        <option value="Apple">Apple</option>
        <option value="Huawei">Huawei</option>
        <option value="OPPO">OPPO</option>
        <option value="Vivo">Vivo</option>
        <option value="Motorola">Motorola</option>
      </select>
      <select id="filterOS">
        <option value="all">🌐 Todos los SO</option>
        <option value="Android">Android</option>
        <option value="iOS">iOS</option>
        <option value="Windows">Windows</option>
        <option value="macOS">macOS</option>
      </select>
      <select id="filterBrowser">
        <option value="all">🔍 Todos los navegadores</option>
        <option value="Chrome">Chrome</option>
        <option value="Safari">Safari</option>
        <option value="Firefox">Firefox</option>
        <option value="Edge">Edge</option>
      </select>
      <input type="text" id="searchInput" placeholder="🔎 Buscar dispositivo, modelo..." />
      <button onclick="clearFilters()"><i class="fas fa-rotate-right"></i> Limpiar</button>
      <button class="secondary" onclick="exportData()"><i class="fas fa-file-csv"></i> Exportar CSV</button>
    </div>

    <div class="table-wrapper">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>🕐 Fecha y Hora</th>
              <th>📱 Dispositivo</th>
              <th>🔧 Detalles</th>
              <th>🌐 Navegador</th>
              <th class="hide-mobile">📐 Pantalla</th>
              <th class="hide-mobile">🌍 Zona</th>
              <th>🔤 Idioma</th>
              <th class="hide-mobile">📋 User Agent</th>
            </tr>
          </thead>
          <tbody id="visitsBody">
            <tr><td colspan="8" class="loading"><i class="fas fa-spinner"></i><br>Cargando visitas en tiempo real...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjXG9ngsNtezJPqEUcrAKryamI8de8qOo",
      authDomain: "brilli-1011.firebaseapp.com", projectId: "brilli-1011",
      storageBucket: "brilli-1011.firebasestorage.app", messagingSenderId: "946270544301",
      appId: "1:946270544301:web:d97f630ab58366ef824124", measurementId: "G-HV35EW82PF"
    };
    const app = initializeApp(firebaseConfig), db = getFirestore(app);
    let allVisits = [];

    function formatTime(ts) {
      if (!ts) return {main: '--:--', sub: ''};
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return {
        main: d.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        sub: d.toLocaleDateString('es-PE', {day:'2-digit',month:'short',year:'numeric'})
      };
    }

    function getDeviceIcon(brand, os) {
      const icons = { Apple: '🍎', Samsung: '📱', Xiaomi: '🔴', Tecno: '✨', Infinix: '♾️', 
        Huawei: '🌸', OPPO: '🟢', Vivo: '🔵', Motorola: '🔷', Nokia: '🔵', Google: '🔷',
        Android: '🤖', iOS: '🍏', Windows: '🪟', macOS: '💻', Linux: '🐧' };
      return icons[brand] || icons[os] || '📲';
    }

    function renderTable(visits) {
      const tbody = document.getElementById('visitsBody');
      if (visits.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">✨ Aún no hay visitas registradas. ¡Comparte el enlace!</td></tr>';
        return;
      }
      tbody.innerHTML = visits.map(v => {
        const t = formatTime(v.timestamp), icon = getDeviceIcon(v.brand, v.os);
        const details = [];
        if (v.model) details.push(`<span>Modelo:</span> ${v.model}`);
        if (v.osVersion) details.push(`<span>SO:</span> ${v.os} ${v.osVersion}`);
        if (v.memory !== 'N/A') details.push(`<span>RAM:</span> ${v.memory}`);
        if (v.cores !== 'N/A') details.push(`<span>Cores:</span> ${v.cores}`);
        return `
          <tr>
            <td class="time-cell"><div class="time-main">${t.main}</div><div class="time-sub">${t.sub}</div></td>
            <td><span class="badge device">${icon} ${v.device}</span></td>
            <td><div class="device-details">${details.join(' • ') || '—'}</div></td>
            <td><span class="badge browser">${v.browser}${v.browserVersion ? ` ${v.browserVersion}` : ''}</span></td>
            <td class="hide-mobile">${v.screen || '—'}</td>
            <td class="hide-mobile">${v.timezone?.split('/')?.pop() || '—'}</td>
            <td>${v.language || '—'}</td>
            <td class="hide-mobile ua-cell" title="${v.userAgent || ''}">${v.userAgent || '—'}</td>
          </tr>
        `;
      }).join('');
    }

    function updateStats(visits) {
      document.getElementById('totalVisits').textContent = visits.length;
      const mobile = visits.filter(v => ['Android','iOS'].includes(v.os)).length;
      const desktop = visits.filter(v => ['Windows','macOS','Linux'].includes(v.os)).length;
      document.getElementById('mobileCount').textContent = mobile;
      document.getElementById('desktopCount').textContent = desktop;
      if (visits[0]?.timestamp) {
        const d = visits[0].timestamp.toDate();
        document.getElementById('lastUpdate').textContent = d.toLocaleTimeString('es-PE');
      }
    }

    function filterVisits() {
      const brand = document.getElementById('filterBrand').value, os = document.getElementById('filterOS').value;
      const browser = document.getElementById('filterBrowser').value, search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allVisits;
      if (brand !== 'all') filtered = filtered.filter(v => v.brand === brand);
      if (os !== 'all') filtered = filtered.filter(v => v.os === os);
      if (browser !== 'all') filtered = filtered.filter(v => v.browser === browser);
      if (search) filtered = filtered.filter(v => 
        (v.device+v.brand+v.model+v.os+v.browser+v.userAgent||'').toLowerCase().includes(search));
      renderTable(filtered);
    }

    function clearFilters() {
      ['filterBrand','filterOS','filterBrowser'].forEach(id => document.getElementById(id).value = 'all');
      document.getElementById('searchInput').value = ''; filterVisits(); showToast('Filtros limpiados ✨');
    }

    function exportData() {
      if (!allVisits.length) return showToast('No hay datos para exportar');
      const headers = ['Fecha','Hora Local','Dispositivo','Marca','Modelo','SO','Versión SO','Navegador','Versión','Pantalla','RAM','Cores','Zona','Idioma','Conexión'];
      const rows = allVisits.map(v => [
        formatTime(v.timestamp).main + ' ' + formatTime(v.timestamp).sub, v.localTime, v.device, v.brand, v.model,
        v.os, v.osVersion, v.browser, v.browserVersion, v.screen, v.memory, v.cores, v.timezone, v.language, v.connection
      ]);
      const csv = [headers.join(','), ...rows.map(r => r.map(f => `"${String(f||'').replace(/"/g,'""')}"`).join(','))].join('\n');
      const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'}), url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `visitas-yorchi-${new Date().toISOString().slice(0,10)}.csv`;
      a.click(); URL.revokeObjectURL(url); showToast('✅ Exportado correctamente');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.clearFilters = clearFilters; window.exportData = exportData;
    ['filterBrand','filterOS','filterBrowser'].forEach(id => document.getElementById(id).addEventListener('change', filterVisits));
    document.getElementById('searchInput').addEventListener('input', filterVisits);

    const q = query(collection(db, 'visitas'), orderBy('timestamp', 'desc'), limit(150));
    onSnapshot(q, (snapshot) => {
      allVisits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      updateStats(allVisits); filterVisits();
    }, (err) => {
      document.getElementById('visitsBody').innerHTML = `<tr><td colspan="8" style="color:#f87171">❌ Error: ${err.message}</td></tr>`;
    });
  </script>
</body>
</html>
